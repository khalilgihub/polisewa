<!DOCTYPE html>
<html>

<head>
    <title>Polisewa Map Search</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Boundary GeoJSON Data -->
    <script src="boundary.js"></script>

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div id="map-wrapper">
        <!-- Floating Search Box -->
        <div id="search-box">
            <div class="search-input-wrapper">
                <input type="text" id="search-input" placeholder="Search places (e.g. Kuching Waterfront)" />
                <button id="search-button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            <!-- Dynamic dropdown results -->
            <div id="search-results"></div>
        </div>

        <!-- Floating Auth Button -->
        <button id="auth-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Login / Sign Up</span>
        </button>

        <!-- Auth Modal Overlay -->
        <div id="auth-modal-overlay" class="modal-overlay">
            <div id="auth-modal" class="modal-card">
                <!-- Close Button -->
                <button class="close-btn" onclick="closeAuthModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>

                <!-- Header -->
                <div class="modal-header">
                    <h2>Welcome to Polisewa</h2>
                    <p>Find room rentals or list your property near Politeknik</p>
                </div>

                <!-- Role Selector Tabs -->
                <div class="role-selector">
                    <button class="role-tab active" onclick="setRole('student')">🎓 Student</button>
                    <button class="role-tab" onclick="setRole('landlord')">🔑 Landlord</button>
                </div>

                <!-- Form Type Toggle (Sign In / Sign Up) -->
                <div class="form-toggle">
                    <button class="toggle-tab active" onclick="setFormType('signin')">Sign In</button>
                    <button class="toggle-tab" onclick="setFormType('signup')">Sign Up</button>
                </div>

                <!-- Sign In Form -->
                <form id="signin-form" class="auth-form active" onsubmit="handleAuthSubmit(event, 'signin')">
                    <div class="input-group">
                        <label for="signin-email">Email Address</label>
                        <input type="email" id="signin-email" required placeholder="name@student.edu.my" />
                    </div>
                    <div class="input-group">
                        <label for="signin-password">Password</label>
                        <input type="password" id="signin-password" required placeholder="••••••••" />
                    </div>
                    <button type="submit" class="submit-btn">Sign In</button>
                </form>

                <!-- Sign Up Form -->
                <form id="signup-form" class="auth-form" onsubmit="handleAuthSubmit(event, 'signup')">
                    <div class="input-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" required placeholder="John Doe" />
                    </div>
                    <div class="input-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" required placeholder="john@example.com" />
                    </div>
                    <div class="input-group">
                        <label for="signup-phone">Phone Number</label>
                        <input type="tel" id="signup-phone" required placeholder="+60123456789" />
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" required placeholder="••••••••" />
                    </div>
                    <!-- Extra field for Student / Landlord details dynamically adjusted -->
                    <div class="input-group" id="extra-field-group">
                        <label id="extra-field-label" for="signup-extra">University / Institution</label>
                        <input type="text" id="signup-extra" placeholder="Politeknik Kuching Sarawak" />
                    </div>
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
            </div>
        </div>

        <!-- The Map -->
        <div id="map"></div>
    </div>

    <!-- Left Property Sidebar Panel (landlord create/edit) -->
    <div id="property-panel" class="property-panel">
        <div class="property-panel-header">
            <button class="panel-back-btn" onclick="closePropertyPanel()" title="Back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="property-panel-title">
                <h3 id="panel-title-text">Add Property</h3>
                <p id="panel-coords" class="panel-coords"></p>
            </div>
        </div>
        <form id="property-panel-form" onsubmit="savePropertyFromPanel(event)">
            <div class="input-group">
                <label for="panel-name">Name</label>
                <input type="text" id="panel-name" required placeholder="Cozy Room near PKS" />
            </div>
            <div class="input-group">
                <label for="panel-desc">Description</label>
                <textarea id="panel-desc" rows="3" placeholder="Single room, furnished, WiFi included"></textarea>
            </div>
            <div class="input-group">
                <label for="panel-price">Monthly Rent (RM)</label>
                <input type="number" id="panel-price" placeholder="350" min="0" />
            </div>
            <div class="input-group">
                <label for="panel-phone">Phone</label>
                <input type="tel" id="panel-phone" placeholder="+60123456789" />
            </div>
            <div id="panel-landlord-info" class="panel-landlord-info"></div>
            <div class="panel-actions" id="panel-actions-edit">
                <button type="button" class="panel-btn-secondary" id="panel-cancel-btn" onclick="closePropertyPanel()">Cancel</button>
                <button type="submit" class="panel-btn-primary" id="panel-save-btn">Add Property</button>
            </div>
            <div class="panel-actions" id="panel-actions-view" style="display:none;">
                <button type="button" class="panel-btn-primary" onclick="closePropertyPanel()">Close</button>
            </div>
        </form>
    </div>

    <script>
        // 1. Initialize Leaflet Map centered on Kuching
        var map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([1.5535, 110.3593], 13);

        // 2. Add Base Map Tiles
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // 3. Draw the Kuching boundary from the boundary.js file (bypasses browser CORS blocks on local file:// files)
        if (typeof kuchingBoundary !== 'undefined') {
            L.geoJSON(kuchingBoundary, {
                style: {
                    color: '#ff6600',    // Orange color
                    dashArray: '8, 8',   // Dotted line style
                    weight: 3.5,
                    fillOpacity: 0       // Transparent fill (outline only)
                },
                interactive: false       // Let clicks pass through to the map
            }).addTo(map);
        } else {
            console.error("kuchingBoundary variable is not defined.");
        }



        // 5. Special Pinpoint: Politeknik Kuching Sarawak (Normal Marker with graduation cap icon)
        var polytechnicLatLng = [1.630688, 110.193062];
        var polytechIcon = L.divIcon({
            className: 'custom-div-icon',
            html: '<div class="marker-pin"></div><span>🎓</span>',
            iconSize: [30, 30],
            iconAnchor: [15, 30],
            popupAnchor: [0, -30]
        });
        var polytechMarker = L.marker(polytechnicLatLng, { icon: polytechIcon }).addTo(map);
        polytechMarker.bindPopup("<b>Politeknik Kuching Sarawak (PKS)</b><br>Batu 8, Jalan Matang");

        // Zoom in when clicking Politeknik Kuching
        polytechMarker.on('click', function (e) {
            map.setView(e.latlng, 16);
        });

        var currentMarker = null;
        var currentUser = null;
        var landlordMarkers = [];
        var editingMarkerIndex = -1;

        function loadProperties() {
            fetch('/api/properties')
                .then(function(res) { return res.json(); })
                .then(function(properties) {
                    for (var i = 0; i < landlordMarkers.length; i++) {
                        map.removeLayer(landlordMarkers[i].marker);
                    }
                    landlordMarkers = [];

                    for (var j = 0; j < properties.length; j++) {
                        var prop = properties[j];
                        var marker = L.marker([prop.lat, prop.lng]).addTo(map);
                        var propertyData = {
                            id: prop.id,
                            user_id: prop.user_id,
                            marker: marker,
                            name: prop.name,
                            desc: prop.desc,
                            price: prop.price,
                            phone: prop.phone,
                            landlord_name: prop.landlord_name,
                            lat: prop.lat,
                            lng: prop.lng
                        };
                        var index = landlordMarkers.length;
                        landlordMarkers.push(propertyData);
                        marker.bindPopup(createMarkerPopup(index));
                        marker.on('click', (function(idx) {
                            return function() {
                                var data = landlordMarkers[idx];
                                var isOwner = currentUser && currentUser.id === data.user_id;
                                if (isOwner) {
                                    map.closePopup();
                                    openPropertyPanel('edit', idx);
                                } else {
                                    map.closePopup();
                                    openPropertyPanel('view', idx);
                                }
                            };
                        })(index));
                    }
                })
                .catch(function(err) {
                    console.error('Failed to load properties:', err);
                });
        }

        loadProperties();

        function rebuildAllPopups() {
            for (var i = 0; i < landlordMarkers.length; i++) {
                landlordMarkers[i].marker.unbindPopup();
                landlordMarkers[i].marker.bindPopup(createMarkerPopup(i));
                landlordMarkers[i].marker.off('click');
                landlordMarkers[i].marker.on('click', (function(idx) {
                    return function() {
                        var data = landlordMarkers[idx];
                        var isOwner = currentUser && currentUser.id === data.user_id;
                        if (isOwner) {
                            map.closePopup();
                            openPropertyPanel('edit', idx);
                        } else {
                            map.closePopup();
                            openPropertyPanel('view', idx);
                        }
                    };
                })(i));
            }
        }

        function createMarkerPopup(index) {
            var data = landlordMarkers[index];
            var isOwner = currentUser && currentUser.id === data.user_id;
            var popupContent = document.createElement('div');
            popupContent.style.minWidth = '180px';

            var actionsHtml = '';
            if (isOwner) {
                actionsHtml = "<br><div style='margin-top:8px;display:flex;gap:6px;'>" +
                    "<button class='edit-pin-btn' style='padding:4px 8px;font-size:12px;cursor:pointer;background:#2563eb;color:white;border:none;border-radius:4px;'>Edit</button>" +
                    "<button class='remove-pin-btn' style='padding:4px 8px;font-size:12px;cursor:pointer;background:#ef4444;color:white;border:none;border-radius:4px;'>Remove</button>" +
                    "</div>";
            } else {
                actionsHtml = "<br><div style='margin-top:8px;display:flex;gap:6px;'>" +
                    "<button class='view-pin-btn' style='padding:4px 8px;font-size:12px;cursor:pointer;background:#2563eb;color:white;border:none;border-radius:4px;'>View Details</button>";
                if (data.landlord_name) {
                    actionsHtml += "<small style='color:#64748b;margin-left:4px;'>" + data.landlord_name + "</small>";
                }
                actionsHtml += "</div>";
            }

            popupContent.innerHTML = "<b>" + data.name + "</b>" +
                (data.desc ? "<br><small>" + data.desc + "</small>" : "") +
                (data.price ? "<br><span style='color:#2563eb;font-weight:600;'>RM " + data.price + "/month</span>" : "") +
                (data.phone ? "<br><small>📞 " + data.phone + "</small>" : "") +
                actionsHtml;

            if (isOwner) {
                popupContent.querySelector('.edit-pin-btn').onclick = function() {
                    map.closePopup();
                    openPropertyPanel('edit', index);
                };
                popupContent.querySelector('.remove-pin-btn').onclick = function() {
                    if (confirm('Delete this property?')) {
                        fetch('/api/properties/' + data.id, {
                            method: 'DELETE',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: currentUser.id })
                        })
                        .then(function(res) { return res.json(); })
                        .then(function(result) {
                            map.removeLayer(data.marker);
                            landlordMarkers.splice(index, 1);
                            editingMarkerIndex = -1;
                            rebuildAllPopups();
                        })
                        .catch(function(err) {
                            alert('Failed to delete property: ' + err.message);
                        });
                    }
                };
            } else {
                popupContent.querySelector('.view-pin-btn').onclick = function() {
                    map.closePopup();
                    openPropertyPanel('view', index);
                };
            }

            return popupContent;
        }

        function refreshPopup(index) {
            var data = landlordMarkers[index];
            if (data.marker.getPopup()) {
                data.marker.setPopupContent(createMarkerPopup(index));
            }
        }

        var panelMode = '';
        var pendingLatLng = null;

        function openPropertyPanel(mode, index) {
            panelMode = mode;
            var panel = document.getElementById('property-panel');
            var title = document.getElementById('panel-title-text');
            var saveBtn = document.getElementById('panel-save-btn');
            var nameInput = document.getElementById('panel-name');
            var descInput = document.getElementById('panel-desc');
            var priceInput = document.getElementById('panel-price');
            var phoneInput = document.getElementById('panel-phone');
            var actionsEdit = document.getElementById('panel-actions-edit');
            var actionsView = document.getElementById('panel-actions-view');
            var landlordInfo = document.getElementById('panel-landlord-info');

            if (mode === 'create') {
                title.innerText = 'Add Property';
                saveBtn.innerText = 'Add Property';
                nameInput.value = '';
                nameInput.disabled = false;
                descInput.value = '';
                descInput.disabled = false;
                priceInput.value = '';
                priceInput.disabled = false;
                phoneInput.value = '';
                phoneInput.disabled = false;
                landlordInfo.innerHTML = '';
                landlordInfo.style.display = 'none';
                actionsEdit.style.display = 'flex';
                actionsView.style.display = 'none';
                if (pendingLatLng) {
                    document.getElementById('panel-coords').innerText =
                        pendingLatLng.lat.toFixed(5) + ', ' + pendingLatLng.lng.toFixed(5);
                }
            } else if (mode === 'edit') {
                editingMarkerIndex = index;
                var data = landlordMarkers[index];
                title.innerText = 'Edit Property';
                saveBtn.innerText = 'Save Changes';
                nameInput.value = data.name || '';
                nameInput.disabled = false;
                descInput.value = data.desc || '';
                descInput.disabled = false;
                priceInput.value = data.price || '';
                priceInput.disabled = false;
                phoneInput.value = data.phone || '';
                phoneInput.disabled = false;
                landlordInfo.innerHTML = '';
                landlordInfo.style.display = 'none';
                actionsEdit.style.display = 'flex';
                actionsView.style.display = 'none';
                document.getElementById('panel-coords').innerText =
                    data.lat.toFixed(5) + ', ' + data.lng.toFixed(5);
            } else if (mode === 'view') {
                var data = landlordMarkers[index];
                title.innerText = data.name || 'Property Details';
                nameInput.value = data.name || '';
                nameInput.disabled = true;
                descInput.value = data.desc || '';
                descInput.disabled = true;
                priceInput.value = data.price || '';
                priceInput.disabled = true;
                phoneInput.value = data.phone || '';
                phoneInput.disabled = true;
                var infoHtml = '<div style="padding:10px 14px;background:#f0f9ff;border-radius:8px;font-size:13px;color:#334155;">';
                if (data.landlord_name) {
                    infoHtml += '<span style="font-weight:600;">Listed by:</span> ' + data.landlord_name;
                }
                if (data.phone) {
                    infoHtml += '<br><span style="font-weight:600;">Contact:</span> ' + data.phone;
                }
                infoHtml += '</div>';
                landlordInfo.innerHTML = infoHtml;
                landlordInfo.style.display = 'block';
                actionsEdit.style.display = 'none';
                actionsView.style.display = 'flex';
                document.getElementById('panel-coords').innerText =
                    data.lat.toFixed(5) + ', ' + data.lng.toFixed(5);
            }

            panel.classList.add('active');
        }

        function closePropertyPanel() {
            document.getElementById('property-panel').classList.remove('active');
            panelMode = '';
            editingMarkerIndex = -1;
            pendingLatLng = null;
        }

        function savePropertyFromPanel(event) {
            event.preventDefault();

            var name = document.getElementById('panel-name').value.trim();
            var desc = document.getElementById('panel-desc').value.trim();
            var price = document.getElementById('panel-price').value.trim();
            var phone = document.getElementById('panel-phone').value.trim();

            if (panelMode === 'create') {
                fetch('/api/properties', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        name: name,
                        desc: desc,
                        price: price,
                        phone: phone,
                        lat: pendingLatLng.lat,
                        lng: pendingLatLng.lng
                    })
                })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (result.error) {
                        alert(result.error);
                        return;
                    }
                    var newMarker = L.marker([pendingLatLng.lat, pendingLatLng.lng]).addTo(map);
                    var propertyData = {
                        id: result.id,
                        user_id: currentUser.id,
                        marker: newMarker,
                        name: name,
                        desc: desc,
                        price: price,
                        phone: phone,
                        landlord_name: currentUser.name,
                        lat: pendingLatLng.lat,
                        lng: pendingLatLng.lng
                    };
                    var index = landlordMarkers.length;
                    landlordMarkers.push(propertyData);
                    newMarker.bindPopup(createMarkerPopup(index));
                    newMarker.on('click', (function(idx) {
                        return function() {
                            var data = landlordMarkers[idx];
                            if (currentUser && currentUser.id === data.user_id) {
                                map.closePopup();
                                openPropertyPanel('edit', idx);
                            } else {
                                map.closePopup();
                                openPropertyPanel('view', idx);
                            }
                        };
                    })(index));
                    newMarker.openPopup();
                    closePropertyPanel();
                })
                .catch(function(err) {
                    alert('Failed to create property: ' + err.message);
                });
            } else if (panelMode === 'edit') {
                if (editingMarkerIndex < 0) return;

                var data = landlordMarkers[editingMarkerIndex];
                data.name = name;
                data.desc = desc;
                data.price = price;
                data.phone = phone;

                fetch('/api/properties/' + data.id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        name: name,
                        desc: desc,
                        price: price,
                        phone: phone
                    })
                })
                .then(function(res) { return res.json(); })
                .then(function() {
                    refreshPopup(editingMarkerIndex);
                    closePropertyPanel();
                })
                .catch(function(err) {
                    alert('Failed to save property: ' + err.message);
                });
            }
        }

        // Landlord click to add marker
        map.on('click', function(e) {
            if (currentUser && currentUser.role === 'landlord') {
                var myCount = 0;
                for (var i = 0; i < landlordMarkers.length; i++) {
                    if (landlordMarkers[i].user_id === currentUser.id) {
                        myCount++;
                    }
                }
                if (myCount >= 2) {
                    alert("You can only add up to 2 pinpoints.");
                    return;
                }
                pendingLatLng = e.latlng;
                openPropertyPanel('create');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var panel = document.getElementById('property-panel');
                if (panel && panel.classList.contains('active')) {
                    closePropertyPanel();
                }
            }
        });

        // 3. Geocoding Search Function
        function performSearch() {
            var query = document.getElementById("search-input").value.trim();
            if (!query) return;

            var resultsContainer = document.getElementById("search-results");
            resultsContainer.innerHTML = '<div style="padding: 12px 16px; color: #64748b; font-size: 14px;">Searching...</div>';
            resultsContainer.style.display = 'block';

            // Query OpenStreetMap Nominatim Free Search API
            var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query) + '&limit=5';

            fetch(url)
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    resultsContainer.innerHTML = '';

                    if (data.length === 0) {
                        resultsContainer.innerHTML = '<div style="padding: 12px 16px; color: #ef4444; font-size: 14px;">No locations found. Try being more specific.</div>';
                        return;
                    }

                    // Loop through results and build dropdown list
                    data.forEach(function (item) {
                        var div = document.createElement('div');
                        div.className = 'result-item';
                        div.innerText = item.display_name;

                        div.onclick = function () {
                            var lat = parseFloat(item.lat);
                            var lon = parseFloat(item.lon);

                            // Zoom & center map on result coordinates
                            map.setView([lat, lon], 16);

                            // Remove old search marker
                            if (currentMarker) {
                                map.removeLayer(currentMarker);
                            }

                            // Place new marker with popup
                            currentMarker = L.marker([lat, lon]).addTo(map);
                            var nameOnly = item.display_name.split(',')[0];
                            currentMarker.bindPopup("<b>" + nameOnly + "</b><br>" + item.display_name).openPopup();

                            // Zoom in when clicking the search marker
                            currentMarker.on('click', function (e) {
                                map.setView(e.latlng, 16);
                            });

                            // Clear search input text and close dropdown
                            resultsContainer.style.display = 'none';
                            document.getElementById("search-input").value = nameOnly;
                        };
                        resultsContainer.appendChild(div);
                    });
                })
                .catch(function (error) {
                    console.error('Search error:', error);
                    resultsContainer.innerHTML = '<div style="padding: 12px 16px; color: #ef4444; font-size: 14px;">Error fetching search results.</div>';
                });
        }

        // Attach Event Listeners
        document.getElementById("search-button").onclick = performSearch;

        // Trigger search on Enter key
        document.getElementById("search-input").onkeydown = function (e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        };

        // Close dropdown when clicking outside search box
        document.addEventListener('click', function (e) {
            var searchBox = document.getElementById("search-box");
            var resultsContainer = document.getElementById("search-results");
            if (!searchBox.contains(e.target)) {
                resultsContainer.style.display = 'none';
            }
        });

        // 6. Authentication Modal Controllers
        var activeRole = 'student';
        var activeForm = 'signin';

        var authBtn = document.getElementById("auth-btn");
        var authModalOverlay = document.getElementById("auth-modal-overlay");

        authBtn.onclick = function () {
            authModalOverlay.classList.add("active");
        };

        function closeAuthModal() {
            authModalOverlay.classList.remove("active");
        }

        // Close modal when clicking outside of modal card
        authModalOverlay.onclick = function (e) {
            if (e.target === authModalOverlay) {
                closeAuthModal();
            }
        };

        function setRole(role) {
            activeRole = role;

            // Toggle active class on tab buttons
            var tabs = document.querySelectorAll(".role-tab");
            tabs[0].classList.toggle("active", role === 'student');
            tabs[1].classList.toggle("active", role === 'landlord');

            // Dynamic Form Labels
            var extraLabel = document.getElementById("extra-field-label");
            var extraInput = document.getElementById("signup-extra");
            var signinEmail = document.getElementById("signin-email");

            if (role === 'student') {
                extraLabel.innerText = "University / Institution";
                extraInput.placeholder = "Politeknik Kuching Sarawak";
                signinEmail.placeholder = "name@student.edu.my";
            } else {
                extraLabel.innerText = "Company / Agency (Optional)";
                extraInput.placeholder = "Matang Rentals Co.";
                signinEmail.placeholder = "landlord@example.com";
            }
        }

        function setFormType(type) {
            activeForm = type;

            // Toggle active class on toggle tab buttons
            var toggles = document.querySelectorAll(".toggle-tab");
            toggles[0].classList.toggle("active", type === 'signin');
            toggles[1].classList.toggle("active", type === 'signup');

            // Toggle active class on forms
            document.getElementById("signin-form").classList.toggle("active", type === 'signin');
            document.getElementById("signup-form").classList.toggle("active", type === 'signup');
        }

        function handleAuthSubmit(event, type) {
            event.preventDefault();

            var payload = {};
            var url = "";

            if (type === 'signin') {
                payload = {
                    email: document.getElementById("signin-email").value.trim(),
                    password: document.getElementById("signin-password").value
                };
                url = "/api/signin";
            } else {
                payload = {
                    name: document.getElementById("signup-name").value.trim(),
                    email: document.getElementById("signup-email").value.trim(),
                    phone: document.getElementById("signup-phone").value.trim(),
                    password: document.getElementById("signup-password").value,
                    role: activeRole,
                    extra: document.getElementById("signup-extra").value.trim()
                };
                url = "/api/signup";
            }

            // Visual loading state on the submit button
            var submitBtn = event.target.querySelector(".submit-btn");
            var originalText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.innerText = "Please wait...";

            fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
                .then(function (response) {
                    return response.json().then(function (data) {
                        if (!response.ok) {
                            throw new Error(data.error || "An error occurred.");
                        }
                        return data;
                    });
                })
                .then(function (data) {
                    alert(data.message);
                    closeAuthModal();
                    event.target.reset();

                    // Update the header auth button for both sign-in and sign-up
                    if (data.user) {
                        currentUser = data.user;
                        var roleIcon = data.user.role === 'student' ? '🎓' : '🔑';
                        authBtn.innerHTML = `
                        <span style="font-size: 14px;">${roleIcon}</span>
                        <span>Hello, ${data.user.name.split(' ')[0]}</span>
                    `;
                        loadProperties();
                    }
                })
                .catch(function (error) {
                    alert("Error: " + error.message);
                })
                .finally(function () {
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalText;
                });
        }
    </script>
</body>

</html>
